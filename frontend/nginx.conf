# ResumeAI Frontend — nginx config
#
# Responsibilities:
#   1. Serve SPA (React Router) — fallback all non-asset paths to /index.html
#   2. Reverse-proxy /api/* and /health to backend container
#   3. SSE long-lived streaming (招聘者批量评分进度推送) — disable buffering
#
# Upstream backend is resolved by Docker compose service name `backend`.

server {
    listen 80;
    server_name _;

    # Gzip text-ish responses (HTML, JS, CSS, JSON, SVG)
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        application/javascript
        application/json
        application/xml
        application/xml+rss
        application/wasm
        image/svg+xml;

    # ── 1. Static assets (immutable Vite output with content-hash names) ──
    # Cache aggressively — Vite emits hashed filenames, so cache busting
    # happens automatically on rebuild.
    location ~* ^/assets/.+\.(js|css|woff2?|ttf|svg|png|jpg|jpeg|webp|ico)$ {
        root /usr/share/nginx/html;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── 2. Backend reverse proxy — /api/* ──
    location /api/ {
        # The trailing slash on both sides is important — it strips the
        # leading /api/ before forwarding (NO: we want to keep it, since
        # FastAPI routes are mounted at /api/*).
        proxy_pass http://backend:8000;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # ── SSE support (招聘者批量评分实时进度推送) ──
        # SSE endpoints stream events for minutes — defaults would buffer
        # or time out.
        proxy_buffering    off;
        proxy_cache        off;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";

        # Allow long-running LLM analysis (single resume ~30s, batch ~minutes)
        proxy_read_timeout  600s;
        proxy_send_timeout  600s;
        proxy_connect_timeout 30s;

        # Generous body size for resume PDF uploads (matches backend 20MB cap)
        client_max_body_size 25M;
    }

    # ── 3. Backend reverse proxy — /health (root-level on backend) ──
    location = /health {
        proxy_pass http://backend:8000/health;
        proxy_set_header Host $host;
        access_log off;
    }

    # ── 4. SPA fallback — every other path serves index.html ──
    # React Router handles client-side routing; deep links must work on refresh.
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # ── 5. Disable nginx version disclosure ──
    server_tokens off;
}
